<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMIS · Personnel - Management</title>
  <!-- Google Fonts & Bootstrap 5 + Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Chart.js & html2pdf (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <!-- Custom CSS (all in one file for this demo) -->
  <style>
    /* ----- CSS Variables (theme) ----- */
    :root {
      --primary: #0d6efd;
      --primary-dark: #0a58ca;
      --secondary: #f8f9fa;
      --accent: #22c55e;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #0ea5e9;
      --glass-bg: rgba(255,255,255,0.65);
      --glass-border: rgba(255,255,255,0.3);
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
      --radius: 1.25rem;
      --transition: 0.25s ease;
      --font: 'Poppins', sans-serif;
    }
    body {
      font-family: var(--font);
      background: #f2f6fc;
      color: #1e293b;
      transition: background 0.3s, color 0.3s;
    }
    /* dark mode overrides (triggered by data-bs-theme) */
    [data-bs-theme="dark"] {
      --secondary: #1e293b;
      --glass-bg: rgba(15,23,42,0.7);
      --glass-border: rgba(255,255,255,0.08);
      background: #0f172a;
      color: #e2e8f0;
    }
    [data-bs-theme="dark"] .card, 
    [data-bs-theme="dark"] .bg-white {
      background: #1e293b !important;
      color: #e2e8f0 !important;
      border-color: #334155 !important;
    }
    [data-bs-theme="dark"] .text-dark { color: #e2e8f0 !important; }
    [data-bs-theme="dark"] .table { color: #e2e8f0; }
    [data-bs-theme="dark"] .table-striped>tbody>tr:nth-of-type(odd) { background: #2d3b52; }
    [data-bs-theme="dark"] .navbar, [data-bs-theme="dark"] .offcanvas { background: #0f172a !important; }
    /* glassmorphism base */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }
    .card {
      border: none;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.10);
    }
    .gradient-header {
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      color: white;
    }
    /* counters */
    .counter-value {
      font-weight: 700;
      font-size: 2.2rem;
      line-height: 1.2;
    }
    /* table & utilities */
    .table th { font-weight: 600; }
    .avatar-sm { width: 38px; height: 38px; object-fit: cover; border-radius: 50%; }
    .avatar-lg { width: 90px; height: 90px; object-fit: cover; border-radius: 50%; }
    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
    }
    .bg-soft-primary { background: #dbeafe; color: #1e40af; }
    .bg-soft-success { background: #d1fae5; color: #065f46; }
    .bg-soft-danger { background: #fecaca; color: #991b1b; }
    .bg-soft-warning { background: #fef3c7; color: #92400e; }
    .bg-soft-secondary { background: #e2e8f0; color: #334155; }
    [data-bs-theme="dark"] .bg-soft-primary { background: #1e3a5f; color: #93c5fd; }
    [data-bs-theme="dark"] .bg-soft-success { background: #1e3a2f; color: #6ee7b7; }
    [data-bs-theme="dark"] .bg-soft-danger { background: #4c1d1d; color: #fca5a5; }
    [data-bs-theme="dark"] .bg-soft-warning { background: #4d3d0a; color: #fcd34d; }
    /* smooth transitions */
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    /* login bg */
    .login-bg {
      background: linear-gradient(135deg, #0b1d31 0%, #1a3a5c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      padding: 2.5rem;
      max-width: 440px;
      width: 100%;
    }
    [data-bs-theme="dark"] .login-card { background: rgba(30,41,59,0.9); }
    /* sidebar / offcanvas tweaks */
    .sidebar-link {
      padding: 0.6rem 1rem;
      border-radius: 0.8rem;
      color: #1e293b;
      transition: 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .sidebar-link:hover, .sidebar-link.active {
      background: #0d6efd;
      color: white;
    }
    [data-bs-theme="dark"] .sidebar-link { color: #e2e8f0; }
    [data-bs-theme="dark"] .sidebar-link:hover,
    [data-bs-theme="dark"] .sidebar-link.active { background: #1d4ed8; }
    /* responsive */
    @media (max-width: 768px) {
      .counter-value { font-size: 1.6rem; }
    }
    /* skeleton loader */
    .skeleton { background: #e2e8f0; border-radius: 0.5rem; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .empty-illustration { opacity: 0.6; font-size: 3rem; }
  </style>
</head>
<body>
  <!-- LOGIN PAGE (visible by default) -->
  <div id="loginPage" class="login-bg">
    <div class="login-card">
      <div class="text-center mb-4">
        <i class="bi bi-people-fill display-4 text-primary"></i>
        <h3 class="fw-bold mt-2">PMIS</h3>
        <p class="text-muted">Personnel Management</p>
      </div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" id="loginUsername" class="form-control" placeholder="admin" value="admin">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <input type="password" id="loginPassword" class="form-control" placeholder="•••••" value="12345">
            <button class="btn btn-outline-secondary" type="button" id="togglePass"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember</label>
          </div>
          <a href="#" class="text-muted small">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </button>
      </form>
      <div id="loginError" class="text-danger small mt-2 d-none">Invalid credentials</div>
    </div>
  </div>

  <!-- MAIN APP (protected) -->
  <div id="appContainer" style="display:none;">
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm px-3 sticky-top">
      <div class="container-fluid">
        <button class="btn btn-outline-secondary d-lg-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarCanvas">
          <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-people-fill text-primary me-1"></i>PMIS</a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <span class="text-muted small d-none d-sm-inline" id="currentDate"></span>
          <button class="btn btn-outline-secondary btn-sm" id="themeToggle" title="Dark/Light"><i class="bi bi-moon"></i></button>
          <button class="btn btn-outline-danger btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right"></i></button>
        </div>
      </div>
    </nav>

    <!-- Offcanvas Sidebar (mobile) + static sidebar (desktop) -->
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar for desktop -->
        <div class="col-lg-2 col-md-3 d-none d-md-block vh-100 bg-white shadow-sm p-3" style="position:sticky; top:60px;">
          <div class="d-flex flex-column gap-1" id="sidebarMenu">
            <a href="#" class="sidebar-link active" data-page="dashboard"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="#" class="sidebar-link" data-page="employees"><i class="bi bi-person-lines-fill"></i> Employees</a>
            <a href="#" class="sidebar-link" data-page="departments"><i class="bi bi-building"></i> Departments</a>
            <a href="#" class="sidebar-link" data-page="reports"><i class="bi bi-bar-chart-fill"></i> Reports</a>
            <a href="#" class="sidebar-link" data-page="settings"><i class="bi bi-gear-fill"></i> Settings</a>
          </div>
          <hr>
          <div class="text-muted small mt-auto">v2.0 · <span id="yearFooter"></span></div>
        </div>
        <!-- Offcanvas for mobile -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarCanvas">
          <div class="offcanvas-header">
            <h5 class="offcanvas-title"><i class="bi bi-people-fill text-primary"></i> PMIS</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
          </div>
          <div class="offcanvas-body d-flex flex-column">
            <div class="d-flex flex-column gap-1">
              <a href="#" class="sidebar-link active" data-page="dashboard"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
              <a href="#" class="sidebar-link" data-page="employees"><i class="bi bi-person-lines-fill"></i> Employees</a>
              <a href="#" class="sidebar-link" data-page="departments"><i class="bi bi-building"></i> Departments</a>
              <a href="#" class="sidebar-link" data-page="reports"><i class="bi bi-bar-chart-fill"></i> Reports</a>
              <a href="#" class="sidebar-link" data-page="settings"><i class="bi bi-gear-fill"></i> Settings</a>
            </div>
          </div>
        </div>

        <!-- Main content -->
        <div class="col-lg-10 col-md-9 p-4">
          <div id="pageContent" class="fade-in">
            <!-- dynamic pages rendered here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS & custom app -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ------------------------------------------------------------
    //  PMIS - Full Application (Vanilla JS, LocalStorage)
    // ------------------------------------------------------------
    (function() {
      "use strict";

      // ----- helpers / storage -----
      const LS = {
        get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
        set(k,v) { localStorage.setItem(k, JSON.stringify(v)); },
        remove(k) { localStorage.removeItem(k); }
      };

      // default seed
      function initStorage() {
        if (!LS.get('users')) {
          LS.set('users', [{ id: 'u1', username: 'admin', password: '12345' }]);
        }
        if (!LS.get('employees')) LS.set('employees', []);
        if (!LS.get('departments')) LS.set('departments', [
          { id: 'd1', name: 'Engineering', description: 'Software development', createdAt: new Date().toISOString() },
          { id: 'd2', name: 'Human Resources', description: 'People & culture', createdAt: new Date().toISOString() }
        ]);
        if (!LS.get('settings')) LS.set('settings', { theme: 'light' });
        if (!LS.get('lastEmployeeNumber')) LS.set('lastEmployeeNumber', 0);
        if (!LS.get('currentUser')) LS.remove('currentUser');
      }
      initStorage();

      // generate employee ID
      function genEmpId() {
        let num = LS.get('lastEmployeeNumber') || 0;
        num++;
        LS.set('lastEmployeeNumber', num);
        return 'EMP' + String(num).padStart(4, '0');
      }

      // ----- app state -----
      let currentPage = 'dashboard';
      let employees = LS.get('employees') || [];
      let departments = LS.get('departments') || [];
      let currentUser = LS.get('currentUser') || null;
      let theme = LS.get('settings')?.theme || 'light';

      // apply theme
      function applyTheme(t) {
        document.documentElement.setAttribute('data-bs-theme', t);
        document.getElementById('themeToggle').innerHTML = t === 'dark' ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon"></i>';
        theme = t;
        let settings = LS.get('settings') || {};
        settings.theme = t;
        LS.set('settings', settings);
      }
      if (theme) applyTheme(theme);

      // ----- auth -----
      function checkAuth() {
        if (!LS.get('currentUser')) {
          document.getElementById('loginPage').style.display = 'flex';
          document.getElementById('appContainer').style.display = 'none';
          return false;
        }
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        return true;
      }

      // login handler
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const uname = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        const users = LS.get('users') || [];
        const found = users.find(u => u.username === uname && u.password === pass);
        if (found) {
          LS.set('currentUser', { id: found.id, username: found.username });
          document.getElementById('loginError').classList.add('d-none');
          checkAuth();
          renderPage(currentPage);
          showToast('Login successful', 'success');
        } else {
          document.getElementById('loginError').classList.remove('d-none');
        }
      });

      document.getElementById('togglePass').addEventListener('click', function() {
        const inp = document.getElementById('loginPassword');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        this.innerHTML = inp.type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
      });

      document.getElementById('logoutBtn').addEventListener('click', function() {
        LS.remove('currentUser');
        checkAuth();
        showToast('Logged out', 'info');
      });

      // theme toggle
      document.getElementById('themeToggle').addEventListener('click', function() {
        const newTheme = theme === 'light' ? 'dark' : 'light';
        applyTheme(newTheme);
      });

      // ----- toast system -----
      function showToast(msg, type = 'success') {
        const container = document.getElementById('toastContainer') || (() => {
          const c = document.createElement('div');
          c.id = 'toastContainer';
          c.className = 'position-fixed bottom-0 end-0 p-3';
          c.style.zIndex = 9999;
          document.body.appendChild(c);
          return c;
        })();
        const toast = document.createElement('div');
        toast.className = `toast align-items-center text-bg-${type} border-0 fade-in`;
        toast.role = 'alert';
        toast.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div><button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
        container.appendChild(toast);
        const bsToast = new bootstrap.Toast(toast, { autohide: true, delay: 3000 });
        bsToast.show();
        toast.addEventListener('hidden.bs.toast', () => toast.remove());
      }

      // ----- routing / rendering -----
      function renderPage(page) {
        currentPage = page;
        // highlight sidebar
        document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
        document.querySelectorAll(`.sidebar-link[data-page="${page}"]`).forEach(el => el.classList.add('active'));
        const content = document.getElementById('pageContent');
        switch(page) {
          case 'dashboard': renderDashboard(content); break;
          case 'employees': renderEmployees(content); break;
          case 'departments': renderDepartments(content); break;
          case 'reports': renderReports(content); break;
          case 'settings': renderSettings(content); break;
          default: content.innerHTML = '<h4>Page not found</h4>';
        }
      }

      // sidebar clicks
      document.addEventListener('click', function(e) {
        const link = e.target.closest('.sidebar-link');
        if (link && link.dataset.page) {
          e.preventDefault();
          const page = link.dataset.page;
          // close offcanvas on mobile
          const canvas = bootstrap.Offcanvas.getInstance(document.getElementById('sidebarCanvas'));
          if (canvas) canvas.hide();
          renderPage(page);
        }
      });

      // ----- DASHBOARD -----
      function renderDashboard(el) {
        const emp = LS.get('employees') || [];
        const depts = LS.get('departments') || [];
        const total = emp.length;
        const active = emp.filter(e => e.status === 'Active').length;
        const inactive = emp.filter(e => e.status === 'Inactive').length;
        const suspended = emp.filter(e => e.status === 'Suspended').length;
        const retired = emp.filter(e => e.status === 'Retired').length;
        const male = emp.filter(e => e.gender === 'Male').length;
        const female = emp.filter(e => e.gender === 'Female').length;
        const newThisMonth = emp.filter(e => {
          const d = new Date(e.createdAt);
          const now = new Date();
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).length;
        const lastEmp = emp.length ? emp[emp.length-1] : null;

        el.innerHTML = `
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold"><i class="bi bi-grid-1x2-fill text-primary me-2"></i>Dashboard</h4>
            <button class="btn btn-outline-primary btn-sm" id="refreshDash"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
          <div class="row g-3 mb-4">
            ${card('Total Employees', total, 'bi-people-fill', 'primary')}
            ${card('Active', active, 'bi-check-circle-fill', 'success')}
            ${card('Inactive', inactive, 'bi-slash-circle', 'secondary')}
            ${card('Suspended', suspended, 'bi-exclamation-triangle-fill', 'warning')}
            ${card('Retired', retired, 'bi-clock-fill', 'danger')}
            ${card('Male', male, 'bi-gender-male', 'info')}
            ${card('Female', female, 'bi-gender-female', 'info')}
            ${card('Departments', depts.length, 'bi-building', 'primary')}
            ${card('New this month', newThisMonth, 'bi-calendar-plus', 'success')}
          </div>
          <div class="row g-3">
            <div class="col-md-6"><div class="card p-3"><h6><i class="bi bi-pie-chart-fill me-1"></i>By Department</h6><canvas id="deptChart" height="150"></canvas></div></div>
            <div class="col-md-6"><div class="card p-3"><h6><i class="bi bi-person-fill me-1"></i>By Gender</h6><canvas id="genderChart" height="150"></canvas></div></div>
            <div class="col-md-6"><div class="card p-3"><h6><i class="bi bi-bar-chart-fill me-1"></i>By Status</h6><canvas id="statusChart" height="150"></canvas></div></div>
            <div class="col-md-6"><div class="card p-3"><h6>📋 Latest employee</h6>${lastEmp ? `<p class="mb-0"><strong>${lastEmp.name}</strong> · ${lastEmp.department} <span class="badge bg-soft-${statusColor(lastEmp.status)}">${lastEmp.status}</span></p>` : '<p class="text-muted">No employees yet</p>'}</div></div>
          </div>
        `;
        // charts
        setTimeout(() => {
          drawDeptChart(emp);
          drawGenderChart(emp);
          drawStatusChart(emp);
        }, 100);
        // refresh
        document.getElementById('refreshDash')?.addEventListener('click', ()=>renderPage('dashboard'));
      }

      function card(label, value, icon, color) {
        return `<div class="col-lg-3 col-md-4 col-sm-6"><div class="card p-3 h-100"><div class="d-flex align-items-center"><div class="bg-soft-${color} p-3 rounded-circle me-3"><i class="bi ${icon} fs-4"></i></div><div><span class="text-muted small">${label}</span><div class="counter-value">${value}</div></div></div></div></div>`;
      }

      function statusColor(s) {
        if (s === 'Active') return 'success';
        if (s === 'Inactive') return 'secondary';
        if (s === 'Suspended') return 'warning';
        if (s === 'Retired') return 'danger';
        return 'secondary';
      }

      let chartInstances = {};
      function drawDeptChart(emp) {
        const depts = LS.get('departments') || [];
        const labels = depts.map(d => d.name);
        const data = labels.map(l => emp.filter(e => e.department === l).length);
        const ctx = document.getElementById('deptChart')?.getContext('2d');
        if (!ctx) return;
        if (chartInstances.dept) chartInstances.dept.destroy();
        chartInstances.dept = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#0d6efd','#22c55e','#f59e0b','#ef4444','#0ea5e9'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
      }
      function drawGenderChart(emp) {
        const ctx = document.getElementById('genderChart')?.getContext('2d');
        if (!ctx) return;
        if (chartInstances.gender) chartInstances.gender.destroy();
        chartInstances.gender = new Chart(ctx, { type: 'pie', data: { labels: ['Male','Female'], datasets: [{ data: [emp.filter(e=>e.gender==='Male').length, emp.filter(e=>e.gender==='Female').length], backgroundColor: ['#0d6efd','#f59e0b'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
      }
      function drawStatusChart(emp) {
        const ctx = document.getElementById('statusChart')?.getContext('2d');
        if (!ctx) return;
        if (chartInstances.status) chartInstances.status.destroy();
        const statuses = ['Active','Inactive','Suspended','Retired'];
        const data = statuses.map(s => emp.filter(e => e.status === s).length);
        chartInstances.status = new Chart(ctx, { type: 'bar', data: { labels: statuses, datasets: [{ label: 'Employees', data, backgroundColor: ['#22c55e','#94a3b8','#f59e0b','#ef4444'] }] }, options: { responsive: true, plugins: { legend: { display: false } } } });
      }

      // ----- EMPLOYEES -----
      function renderEmployees(el) {
        let emp = LS.get('employees') || [];
        const depts = LS.get('departments') || [];
        let html = `
          <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
            <h4 class="fw-bold"><i class="bi bi-person-lines-fill text-primary me-2"></i>Employees</h4>
            <div><button class="btn btn-primary btn-sm me-1" id="addEmpBtn"><i class="bi bi-plus-lg"></i> Add</button>
            <button class="btn btn-outline-secondary btn-sm me-1" id="exportCsvBtn"><i class="bi bi-download"></i> CSV</button>
            <button class="btn btn-outline-secondary btn-sm" id="importCsvBtn"><i class="bi bi-upload"></i> Import</button></div>
          </div>
          <input class="form-control mb-2" id="searchEmp" placeholder="Search by name, ID, department..." />
          <div class="table-responsive">
            <table class="table table-hover table-striped align-middle">
              <thead><tr><th>Photo</th><th>ID</th><th>Name</th><th>Department</th><th>Position</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody id="empTableBody"></tbody>
            </table>
          </div>
          <div id="paginationControls" class="d-flex justify-content-between align-items-center mt-2"></div>
        `;
        el.innerHTML = html;

        const searchInput = document.getElementById('searchEmp');
        let filtered = [...emp];
        function renderTable(data) {
          const tbody = document.getElementById('empTableBody');
          if (!data.length) { tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4"><i class="bi bi-inbox display-6 d-block"></i>No employees found</td></tr>`; return; }
          tbody.innerHTML = data.map(e => `
            <tr>
              <td><img src="${e.photo || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2238%22 height=%2238%22 viewBox=%220 0 38 38%22%3E%3Crect width=%2238%22 height=%2238%22 fill=%22%23e2e8f0%22/%3E%3Ctext x=%2219%22 y=%2224%22 font-size=%2214%22 text-anchor=%22middle%22 fill=%22%236b7280%22%3E👤%3C/text%3E%3C/svg%3E'}" class="avatar-sm"></td>
              <td><span class="fw-semibold">${e.employeeId}</span></td>
              <td>${e.name}</td>
              <td>${e.department || '-'}</td>
              <td>${e.position || '-'}</td>
              <td><span class="badge bg-soft-${statusColor(e.status)}">${e.status}</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary viewEmp" data-id="${e.id}"><i class="bi bi-eye"></i></button>
                <button class="btn btn-sm btn-outline-warning editEmp" data-id="${e.id}"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger deleteEmp" data-id="${e.id}"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          `).join('');
          // attach events
          tbody.querySelectorAll('.viewEmp').forEach(b => b.addEventListener('click', ()=>viewEmployee(b.dataset.id)));
          tbody.querySelectorAll('.editEmp').forEach(b => b.addEventListener('click', ()=>editEmployee(b.dataset.id)));
          tbody.querySelectorAll('.deleteEmp').forEach(b => b.addEventListener('click', ()=>deleteEmployee(b.dataset.id)));
        }

        function filterEmployees() {
          const q = searchInput.value.toLowerCase();
          filtered = emp.filter(e => 
            e.employeeId.toLowerCase().includes(q) ||
            (e.name||'').toLowerCase().includes(q) ||
            (e.department||'').toLowerCase().includes(q) ||
            (e.position||'').toLowerCase().includes(q) ||
            (e.status||'').toLowerCase().includes(q)
          );
          renderTable(filtered);
        }
        searchInput.addEventListener('input', filterEmployees);
        renderTable(emp);

        // add employee: use modal or simple form (we'll use a prompt-style but better: modal)
        document.getElementById('addEmpBtn').addEventListener('click', ()=>openEmployeeForm());
        // export CSV
        document.getElementById('exportCsvBtn').addEventListener('click', ()=>exportCsv(emp));
        // import CSV
        document.getElementById('importCsvBtn').addEventListener('click', ()=>importCsv());
        // store for later
        window._empData = emp;
      }

      // ----- employee CRUD helpers (modal) -----
      function openEmployeeForm(empData = null) {
        const depts = LS.get('departments') || [];
        const isEdit = !!empData;
        const modal = document.createElement('div');
        modal.className = 'modal fade';
        modal.id = 'empFormModal';
        modal.innerHTML = `
          <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content glass">
              <div class="modal-header"><h5 class="modal-title">${isEdit ? 'Edit' : 'Add'} Employee</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
              <div class="modal-body">
                <form id="empForm">
                  <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Full Name</label><input class="form-control" id="fName" value="${empData?.name||''}" required></div>
                    <div class="col-md-6"><label class="form-label">Gender</label>
                      <select class="form-select" id="fGender"><option value="Male">Male</option><option value="Female">Female</option></select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Department</label>
                      <select class="form-select" id="fDept">${depts.map(d => `<option value="${d.name}">${d.name}</option>`).join('')}</select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Position</label><input class="form-control" id="fPosition" value="${empData?.position||''}"></div>
                    <div class="col-md-6"><label class="form-label">Status</label>
                      <select class="form-select" id="fStatus"><option>Active</option><option>Inactive</option><option>Suspended</option><option>Retired</option></select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="fEmail" value="${empData?.email||''}"></div>
                    <div class="col-12"><label class="form-label">Photo URL (optional)</label><input class="form-control" id="fPhoto" placeholder="https://example.com/photo.jpg" value="${empData?.photo||''}"></div>
                  </div>
                </form>
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="saveEmpBtn">${isEdit ? 'Update' : 'Save'}</button>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
        const modalInstance = new bootstrap.Modal(modal);
        modalInstance.show();

        // prefill
        if (isEdit) {
          document.getElementById('fGender').value = empData.gender || 'Male';
          document.getElementById('fStatus').value = empData.status || 'Active';
          document.getElementById('fDept').value = empData.department || (depts[0]?.name || '');
        }
        document.getElementById('saveEmpBtn').addEventListener('click', function() {
          const name = document.getElementById('fName').value.trim();
          if (!name) { showToast('Name is required', 'danger'); return; }
          const gender = document.getElementById('fGender').value;
          const department = document.getElementById('fDept').value;
          const position = document.getElementById('fPosition').value.trim();
          const status = document.getElementById('fStatus').value;
          const email = document.getElementById('fEmail').value.trim();
          const photo = document.getElementById('fPhoto').value.trim();
          let employees = LS.get('employees') || [];
          if (isEdit) {
            const idx = employees.findIndex(e => e.id === empData.id);
            if (idx > -1) {
              employees[idx] = { ...employees[idx], name, gender, department, position, status, email, photo };
              LS.set('employees', employees);
              showToast('Employee updated', 'success');
            }
          } else {
            const newEmp = {
              id: 'e' + Date.now(),
              employeeId: genEmpId(),
              name,
              gender,
              department,
              position,
              status,
              email,
              photo,
              createdAt: new Date().toISOString()
            };
            employees.push(newEmp);
            LS.set('employees', employees);
            showToast('Employee added', 'success');
          }
          modalInstance.hide();
          modal.remove();
          renderPage('employees');
        });
        modal.addEventListener('hidden.bs.modal', ()=> modal.remove());
      }

      function viewEmployee(id) {
        const emp = (LS.get('employees') || []).find(e => e.id === id);
        if (!emp) return;
        // simple profile view
        const modal = document.createElement('div');
        modal.className = 'modal fade';
        modal.innerHTML = `
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass">
              <div class="modal-header"><h5 class="modal-title">Employee Profile</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
              <div class="modal-body text-center">
                <img src="${emp.photo || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2290%22 height=%2290%22 viewBox=%220 0 90 90%22%3E%3Crect width=%2290%22 height=%2290%22 fill=%22%23e2e8f0%22/%3E%3Ctext x=%2245%22 y=%2255%22 font-size=%2230%22 text-anchor=%22middle%22 fill=%22%236b7280%22%3E👤%3C/text%3E%3C/svg%3E'}" class="avatar-lg mb-2">
                <h5>${emp.name}</h5>
                <p><span class="badge bg-soft-${statusColor(emp.status)}">${emp.status}</span></p>
                <p><i class="bi bi-building"></i> ${emp.department || '-'} · ${emp.position || '-'}</p>
                <p><i class="bi bi-envelope"></i> ${emp.email || '-'}</p>
                <p><i class="bi bi-person-badge"></i> ${emp.employeeId}</p>
                <button class="btn btn-outline-primary btn-sm" id="printEmpProfile" data-id="${emp.id}"><i class="bi bi-printer"></i> Print PDF</button>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
        const modalInstance = new bootstrap.Modal(modal);
        modalInstance.show();
        document.getElementById('printEmpProfile')?.addEventListener('click', function() {
          generatePdf(emp);
        });
        modal.addEventListener('hidden.bs.modal', ()=> modal.remove());
      }

      function editEmployee(id) {
        const emp = (LS.get('employees') || []).find(e => e.id === id);
        if (emp) openEmployeeForm(emp);
      }

      function deleteEmployee(id) {
        const emp = (LS.get('employees') || []).find(e => e.id === id);
        if (!emp) return;
        if (!confirm(`Delete ${emp.name}? This cannot be undone.`)) return;
        let employees = LS.get('employees') || [];
        employees = employees.filter(e => e.id !== id);
        LS.set('employees', employees);
        showToast('Employee deleted', 'danger');
        renderPage('employees');
      }

      // ----- CSV export/import -----
      function exportCsv(emp) {
        if (!emp.length) { showToast('No employees to export', 'warning'); return; }
        const headers = ['EmployeeID','Name','Gender','Department','Position','Status','Email'];
        const rows = emp.map(e => [e.employeeId, e.name, e.gender, e.department, e.position, e.status, e.email]);
        const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'employees.csv'; a.click();
        URL.revokeObjectURL(url);
        showToast('CSV exported', 'success');
      }

      function importCsv() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.csv';
        input.onchange = function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function(ev) {
            const text = ev.target.result;
            const lines = text.split('\n').filter(l => l.trim());
            if (lines.length < 2) { showToast('Invalid CSV', 'danger'); return; }
            const headers = lines[0].split(',').map(h => h.trim());
            const employees = LS.get('employees') || [];
            let count = 0;
            for (let i=1; i<lines.length; i++) {
              const vals = lines[i].split(',').map(v => v.trim());
              if (vals.length < 3) continue;
              const emp = {
                id: 'e' + Date.now() + i,
                employeeId: genEmpId(),
                name: vals[1] || vals[0] || 'Unknown',
                gender: vals[2] || 'Male',
                department: vals[3] || '',
                position: vals[4] || '',
                status: vals[5] || 'Active',
                email: vals[6] || '',
                photo: '',
                createdAt: new Date().toISOString()
              };
              employees.push(emp);
              count++;
            }
            LS.set('employees', employees);
            showToast(`Imported ${count} employees`, 'success');
            renderPage('employees');
          };
          reader.readAsText(file);
        };
        input.click();
      }

      // ----- PDF generation -----
      function generatePdf(emp) {
        const content = document.createElement('div');
        content.style.padding = '20px';
        content.style.fontFamily = 'sans-serif';
        content.innerHTML = `
          <h2>Employee Profile</h2>
          <img src="${emp.photo || ''}" style="width:100px;border-radius:50%;"/>
          <h3>${emp.name}</h3>
          <p>ID: ${emp.employeeId}</p>
          <p>Department: ${emp.department}</p>
          <p>Position: ${emp.position}</p>
          <p>Status: ${emp.status}</p>
          <p>Email: ${emp.email}</p>
          <hr><p>Generated by PMIS</p>
        `;
        document.body.appendChild(content);
        html2pdf().from(content).save(`${emp.employeeId}.pdf`).then(()=> content.remove());
        showToast('PDF generated', 'info');
      }

      // ----- DEPARTMENTS -----
      function renderDepartments(el) {
        let depts = LS.get('departments') || [];
        const employees = LS.get('employees') || [];
        let html = `
          <div class="d-flex justify-content-between align-items-center mb-3"><h4><i class="bi bi-building text-primary me-2"></i>Departments</h4><button class="btn btn-primary btn-sm" id="addDeptBtn"><i class="bi bi-plus-lg"></i> Add</button></div>
          <div class="table-responsive"><table class="table table-hover"><thead><tr><th>Name</th><th>Description</th><th>Employees</th><th>Created</th><th>Actions</th></tr></thead><tbody id="deptTableBody"></tbody></table></div>
        `;
        el.innerHTML = html;
        function renderDeptTable() {
          const tbody = document.getElementById('deptTableBody');
          if (!depts.length) { tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No departments</td></tr>`; return; }
          tbody.innerHTML = depts.map(d => `
            <tr><td><strong>${d.name}</strong></td><td>${d.description || '-'}</td><td>${employees.filter(e=>e.department===d.name).length}</td><td>${new Date(d.createdAt).toLocaleDateString()}</td>
            <td><button class="btn btn-sm btn-outline-warning editDept" data-id="${d.id}"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger deleteDept" data-id="${d.id}"><i class="bi bi-trash"></i></button></td></tr>
          `).join('');
          tbody.querySelectorAll('.editDept').forEach(b => b.addEventListener('click', ()=>editDept(b.dataset.id)));
          tbody.querySelectorAll('.deleteDept').forEach(b => b.addEventListener('click', ()=>deleteDept(b.dataset.id)));
        }
        renderDeptTable();

        document.getElementById('addDeptBtn').addEventListener('click', ()=>{
          const name = prompt('Department name:');
          if (!name) return;
          const depts2 = LS.get('departments') || [];
          if (depts2.find(d => d.name.toLowerCase() === name.toLowerCase())) { showToast('Duplicate department', 'danger'); return; }
          depts2.push({ id: 'd'+Date.now(), name, description: '', createdAt: new Date().toISOString() });
          LS.set('departments', depts2);
          showToast('Department added', 'success');
          renderPage('departments');
        });
        window.editDept = function(id) {
          const depts3 = LS.get('departments') || [];
          const d = depts3.find(x => x.id === id);
          if (!d) return;
          const newName = prompt('Edit department name:', d.name);
          if (!newName) return;
          d.name = newName;
          LS.set('departments', depts3);
          showToast('Department updated', 'success');
          renderPage('departments');
        };
        window.deleteDept = function(id) {
          if (!confirm('Delete this department?')) return;
          let depts4 = LS.get('departments') || [];
          depts4 = depts4.filter(d => d.id !== id);
          LS.set('departments', depts4);
          showToast('Department deleted', 'danger');
          renderPage('departments');
        };
      }

      // ----- REPORTS (simple charts) -----
      function renderReports(el) {
        const emp = LS.get('employees') || [];
        const depts = LS.get('departments') || [];
        el.innerHTML = `
          <h4><i class="bi bi-bar-chart-fill text-primary me-2"></i>Reports</h4>
          <div class="row g-3">
            <div class="col-md-6"><div class="card p-3"><h6>By Department (Bar)</h6><canvas id="rDeptBar" height="150"></canvas></div></div>
            <div class="col-md-6"><div class="card p-3"><h6>By Gender (Pie)</h6><canvas id="rGenderPie" height="150"></canvas></div></div>
            <div class="col-md-6"><div class="card p-3"><h6>By Status (Doughnut)</h6><canvas id="rStatusDoughnut" height="150"></canvas></div></div>
            <div class="col-md-6"><div class="card p-3"><h6>Monthly registration (line)</h6><canvas id="rMonthly" height="150"></canvas></div></div>
          </div>
        `;
        setTimeout(() => {
          const deptLabels = depts.map(d => d.name);
          const deptData = deptLabels.map(l => emp.filter(e=>e.department===l).length);
          const ctx1 = document.getElementById('rDeptBar')?.getContext('2d');
          if (ctx1) new Chart(ctx1, { type: 'bar', data: { labels: deptLabels, datasets: [{ label: 'Employees', data: deptData, backgroundColor: '#0d6efd' }] }, options: { responsive: true, plugins: { legend: { display: false } } } });
          const ctx2 = document.getElementById('rGenderPie')?.getContext('2d');
          if (ctx2) new Chart(ctx2, { type: 'pie', data: { labels: ['Male','Female'], datasets: [{ data: [emp.filter(e=>e.gender==='Male').length, emp.filter(e=>e.gender==='Female').length], backgroundColor: ['#0d6efd','#f59e0b'] }] }, options: { responsive: true } });
          const ctx3 = document.getElementById('rStatusDoughnut')?.getContext('2d');
          if (ctx3) new Chart(ctx3, { type: 'doughnut', data: { labels: ['Active','Inactive','Suspended','Retired'], datasets: [{ data: ['Active','Inactive','Suspended','Retired'].map(s => emp.filter(e=>e.status===s).length), backgroundColor: ['#22c55e','#94a3b8','#f59e0b','#ef4444'] }] }, options: { responsive: true } });
          // monthly
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const counts = months.map((m,i) => emp.filter(e => new Date(e.createdAt).getMonth() === i).length);
          const ctx4 = document.getElementById('rMonthly')?.getContext('2d');
          if (ctx4) new Chart(ctx4, { type: 'line', data: { labels: months, datasets: [{ label: 'New hires', data: counts, borderColor: '#0d6efd', tension: 0.2 }] }, options: { responsive: true } });
        }, 100);
      }

      // ----- SETTINGS -----
      function renderSettings(el) {
        el.innerHTML = `
          <h4><i class="bi bi-gear-fill text-primary me-2"></i>Settings</h4>
          <div class="card p-4 mb-3"><h6>Change Username / Password</h6>
            <div class="row g-2"><div class="col-md-4"><input class="form-control" id="newUname" placeholder="New username"></div>
            <div class="col-md-4"><input class="form-control" id="newPass" placeholder="New password"></div>
            <div class="col-md-4"><button class="btn btn-primary" id="updateCredBtn">Update</button></div></div>
          </div>
          <div class="card p-4 mb-3"><h6>Danger Zone</h6>
            <button class="btn btn-outline-danger me-2" id="resetAppBtn"><i class="bi bi-arrow-counterclockwise"></i> Reset Application</button>
            <button class="btn btn-outline-secondary me-2" id="backupBtn"><i class="bi bi-download"></i> Backup</button>
            <button class="btn btn-outline-secondary" id="restoreBtn"><i class="bi bi-upload"></i> Restore</button>
          </div>
        `;
        document.getElementById('updateCredBtn').addEventListener('click', function() {
          const users = LS.get('users') || [];
          const uname = document.getElementById('newUname').value.trim();
          const pass = document.getElementById('newPass').value.trim();
          if (uname) users[0].username = uname;
          if (pass) users[0].password = pass;
          LS.set('users', users);
          showToast('Credentials updated', 'success');
        });
        document.getElementById('resetAppBtn').addEventListener('click', function() {
          if (!confirm('Reset all data?')) return;
          localStorage.clear();
          initStorage();
          showToast('App reset', 'info');
          location.reload();
        });
        document.getElementById('backupBtn').addEventListener('click', function() {
          const data = { users: LS.get('users'), employees: LS.get('employees'), departments: LS.get('departments'), settings: LS.get('settings') };
          const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'pmis_backup.json';
          a.click();
        });
        document.getElementById('restoreBtn').addEventListener('click', function() {
          const input = document.createElement('input');
          input.type = 'file'; input.accept = '.json';
          input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
              try {
                const data = JSON.parse(ev.target.result);
                if (data.users) LS.set('users', data.users);
                if (data.employees) LS.set('employees', data.employees);
                if (data.departments) LS.set('departments', data.departments);
                if (data.settings) LS.set('settings', data.settings);
                showToast('Restore successful', 'success');
                location.reload();
              } catch { showToast('Invalid backup', 'danger'); }
            };
            reader.readAsText(file);
          };
          input.click();
        });
      }

      // ----- init -----
      document.getElementById('yearFooter').textContent = new Date().getFullYear();
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

      if (checkAuth()) {
        renderPage('dashboard');
      }

      // re-render on storage change (for multi-tab)
      window.addEventListener('storage', function(e) {
        if (e.key === 'employees' || e.key === 'departments') {
          if (currentPage === 'dashboard' || currentPage === 'employees' || currentPage === 'departments' || currentPage === 'reports') {
            renderPage(currentPage);
          }
        }
      });

    })();
  </script>
</body>
</html>
